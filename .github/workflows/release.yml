# DEMO: release.yml v4 — dual trigger (workflow_dispatch + repository_dispatch)
#
# User-facing dispatch form has 3 fields: target, from, bump.
# Chain dispatch (from on-approve.yml) uses repository_dispatch with
# client_payload → release_type and triggered_by pass invisibly.
name: Release

run-name: >-
  ${{
    github.event_name == 'repository_dispatch' &&
      format('{0} | from={1} | by:{2} | action: {3}{4}',
        github.event.client_payload.release_type == 'hotfix' && 'HOTFIX' || 'PROD',
        github.event.client_payload.from,
        github.event.client_payload.triggered_by,
        github.event.client_payload.target == 'prod-deploy' && 'DEPLOY' || 'BUILD',
        github.event.client_payload.release_type == 'cherrypick' && ' | mode: CHERRYPICK' || '')
    || inputs.target == 'rollback' &&
      format('ROLLBACK | from={0} | by:{1} | action: ROLLBACK',
        inputs.from, github.actor)
    || (inputs.target == 'stg' && startsWith(inputs.from, 'hotfix/')) &&
      format('HOTFIX | from={0} | by:{1}',
        inputs.from, github.actor)
    || (inputs.target == 'stg' && startsWith(inputs.from, 'release/')) &&
      format('STG | from={0} | by:{1} | mode: CHERRYPICK',
        inputs.from, github.actor)
    || inputs.target == 'dev' &&
      format('DEV | from={0} | by:{1}',
        inputs.from != '' && inputs.from || 'main', github.actor)
    || inputs.target == 'stg' &&
      format('STG | from={0} | by:{1}',
        inputs.from != '' && inputs.from || 'main', github.actor)
    || inputs.target == 'prod-build' &&
      format('PROD | from={0} | by:{1} | action: BUILD',
        inputs.from, github.actor)
    || inputs.target == 'prod-deploy' &&
      format('PROD | from={0} | by:{1} | action: DEPLOY',
        inputs.from, github.actor)
    || 'Release run'
  }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        type: choice
        options:
          - dev
          - stg
          - prod-build
          - prod-deploy
          - rollback
      from:
        description: "Source ref. dev/stg: branch/SHA. prod-build/prod-deploy: RC tag. rollback: GA tag."
        required: false
        type: string
        default: ""
      bump:
        description: "Version bump for stg cut from main"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
  # Chain trigger from on-approve.yml. client_payload shape:
  #   { target, from, release_type, triggered_by }
  repository_dispatch:
    types: [release]

concurrency:
  group: release-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.target || inputs.target }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  deployments: write
  actions: write

jobs:
  # ================================================================
  # SETUP — parse event, resolve config, compute version, classify
  # ================================================================
  setup:
    name: "Setup · classify & resolve"
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.event.outputs.target }}
      from: ${{ steps.event.outputs.from }}
      bump: ${{ steps.event.outputs.bump }}
      triggered_by: ${{ steps.event.outputs.triggered_by }}
      app_env: ${{ steps.env.outputs.app_env }}
      deployment_env: ${{ steps.env.outputs.deployment_env }}
      version: ${{ steps.version.outputs.version }}
      rc_tag: ${{ steps.version.outputs.rc_tag }}
      ga_tag: ${{ steps.version.outputs.ga_tag }}
      image_tag: ${{ steps.version.outputs.image_tag }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      release_type: ${{ steps.release_type.outputs.type }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # -----------------------------------------------------------------
      # Parse dispatch event — unify workflow_dispatch + repository_dispatch
      # -----------------------------------------------------------------
      - name: Parse dispatch event
        id: event
        env:
          IS_CHAIN: ${{ github.event_name == 'repository_dispatch' }}
          WD_TARGET: ${{ inputs.target }}
          WD_FROM: ${{ inputs.from }}
          WD_BUMP: ${{ inputs.bump }}
          CP_TARGET: ${{ github.event.client_payload.target }}
          CP_FROM: ${{ github.event.client_payload.from }}
          CP_TRIGGERED_BY: ${{ github.event.client_payload.triggered_by }}
          CP_RELEASE_TYPE: ${{ github.event.client_payload.release_type }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          if [[ "$IS_CHAIN" == "true" ]]; then
            TARGET="$CP_TARGET"
            FROM="$CP_FROM"
            BUMP="patch"
            TRIGGERED_BY="$CP_TRIGGERED_BY"
            RELEASE_TYPE_INPUT="$CP_RELEASE_TYPE"
            echo "Source: repository_dispatch (chain)"
          else
            TARGET="$WD_TARGET"
            FROM="$WD_FROM"
            BUMP="$WD_BUMP"
            TRIGGERED_BY="$GH_ACTOR"
            RELEASE_TYPE_INPUT=""    # auto-detect
            echo "Source: workflow_dispatch (manual)"
          fi

          {
            echo "target=$TARGET"
            echo "from=$FROM"
            echo "bump=$BUMP"
            echo "triggered_by=$TRIGGERED_BY"
            echo "release_type_input=$RELEASE_TYPE_INPUT"
          } >> "$GITHUB_OUTPUT"

          echo "Target=$TARGET · From=$FROM · Bump=$BUMP · By=$TRIGGERED_BY"

      # -----------------------------------------------------------------
      # Classify release type (auto-detect if not set by chain)
      # -----------------------------------------------------------------
      - name: Classify release type
        id: release_type
        env:
          INPUT_TYPE: ${{ steps.event.outputs.release_type_input }}
          FROM: ${{ steps.event.outputs.from }}
          TARGET: ${{ steps.event.outputs.target }}
        run: |
          TYPE="$INPUT_TYPE"

          if [[ -z "$TYPE" || "$TYPE" == "regular" ]]; then
            case "$TARGET" in
              stg)
                case "$FROM" in
                  hotfix/*)  TYPE="hotfix" ;;
                  release/*) TYPE="cherrypick" ;;
                  *)         TYPE="regular" ;;
                esac
                ;;
              prod-build|prod-deploy)
                RC_SHA=$(git rev-parse --verify "refs/tags/$FROM" 2>/dev/null || true)
                if [[ -n "$RC_SHA" ]]; then
                  BRANCHES=$(git branch -r --contains "$RC_SHA" 2>/dev/null || true)
                  if echo "$BRANCHES" | grep -qE '^\s*origin/hotfix/'; then
                    TYPE="hotfix"
                  elif echo "$BRANCHES" | grep -qE '^\s*origin/release/'; then
                    TYPE="cherrypick"
                  else
                    TYPE="regular"
                  fi
                else
                  TYPE="regular"
                fi
                ;;
              *)
                TYPE="regular"
                ;;
            esac
          fi

          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "Release type: $TYPE (target=$TARGET, from=$FROM)"

      # -----------------------------------------------------------------
      # Resolve environment config
      # -----------------------------------------------------------------
      - name: Resolve environment config
        id: env
        env:
          TARGET: ${{ steps.event.outputs.target }}
        run: |
          case "$TARGET" in
            dev)
              APP_ENV="development"
              DEPLOYMENT_ENV="development"
              ;;
            stg)
              APP_ENV="staging"
              DEPLOYMENT_ENV="staging"
              ;;
            prod-build)
              APP_ENV="production"
              DEPLOYMENT_ENV=""
              ;;
            prod-deploy|rollback)
              APP_ENV="production"
              DEPLOYMENT_ENV="production"
              ;;
          esac
          echo "app_env=$APP_ENV" >> "$GITHUB_OUTPUT"
          echo "deployment_env=$DEPLOYMENT_ENV" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------
      # Compute version and image tag
      # -----------------------------------------------------------------
      - name: Compute version and image tag
        id: version
        env:
          TARGET: ${{ steps.event.outputs.target }}
          FROM: ${{ steps.event.outputs.from }}
          BUMP: ${{ steps.event.outputs.bump }}
          RELEASE_TYPE: ${{ steps.release_type.outputs.type }}
        run: |
          VERSION=""
          RC_TAG=""
          GA_TAG=""
          IMAGE_TAG=""

          case "$TARGET" in
            dev)
              REF="${FROM:-main}"
              RESOLVED=$(git rev-parse --verify "$REF^{commit}" 2>/dev/null \
                || git rev-parse --verify "origin/$REF^{commit}" 2>/dev/null)
              if [[ -z "$RESOLVED" ]]; then
                echo "::error::Cannot resolve ref: $REF"
                exit 1
              fi
              SHORT_SHA=$(git rev-parse --short=7 "$RESOLVED")
              IMAGE_TAG="dev-${SHORT_SHA}-arm"
              ;;
            stg)
              case "$RELEASE_TYPE" in
                hotfix|cherrypick)
                  VERSION=$(echo "$FROM" | sed -E 's|^(hotfix|release)/||')
                  if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "::error::Cannot parse version from branch: $FROM"
                    exit 1
                  fi
                  ;;
                *)
                  LATEST_GA=$(git tag -l 'v*' \
                    | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                    | sort -V \
                    | tail -1)
                  LATEST_GA="${LATEST_GA:-v0.0.0}"
                  SEMVER="${LATEST_GA#v}"
                  MAJOR=$(echo "$SEMVER" | cut -d. -f1)
                  MINOR=$(echo "$SEMVER" | cut -d. -f2)
                  PATCH=$(echo "$SEMVER" | cut -d. -f3)
                  case "$BUMP" in
                    major) VERSION="v$((MAJOR+1)).0.0" ;;
                    minor) VERSION="v${MAJOR}.$((MINOR+1)).0" ;;
                    patch) VERSION="v${MAJOR}.${MINOR}.$((PATCH+1))" ;;
                  esac
                  ;;
              esac
              RC_TAG="${VERSION}-rc"
              IMAGE_TAG="${RC_TAG}-arm"
              ;;
            prod-build)
              if ! [[ "$FROM" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc$ ]]; then
                echo "::error::prod-build requires from=<RC tag>. Got: $FROM"
                exit 1
              fi
              RC_TAG="$FROM"
              VERSION="${FROM%-rc}"
              IMAGE_TAG="${VERSION}-prod-arm"
              ;;
            prod-deploy)
              if ! [[ "$FROM" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc$ ]]; then
                echo "::error::prod-deploy requires from=<RC tag>. Got: $FROM"
                exit 1
              fi
              RC_TAG="$FROM"
              VERSION="${FROM%-rc}"
              GA_TAG="$VERSION"
              IMAGE_TAG="${VERSION}-arm"
              ;;
            rollback)
              if ! [[ "$FROM" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "::error::rollback requires from=<GA tag>. Got: $FROM"
                exit 1
              fi
              if ! git rev-parse --verify "refs/tags/$FROM" >/dev/null 2>&1; then
                echo "::error::GA tag $FROM does not exist"
                exit 1
              fi
              VERSION="$FROM"
              GA_TAG="$VERSION"
              IMAGE_TAG="${VERSION}-arm"
              ;;
          esac

          {
            echo "version=$VERSION"
            echo "rc_tag=$RC_TAG"
            echo "ga_tag=$GA_TAG"
            echo "image_tag=$IMAGE_TAG"
          } >> "$GITHUB_OUTPUT"

          echo "Version: ${VERSION:-n/a} | Image: $IMAGE_TAG"

      # -----------------------------------------------------------------
      # Resolve commit SHA
      # -----------------------------------------------------------------
      - name: Resolve commit SHA
        id: resolve
        env:
          FROM: ${{ steps.event.outputs.from }}
        run: |
          REF="${FROM:-main}"
          # ^{commit} dereferences annotated tags to their underlying commit.
          # Without it, git rev-parse on annotated tags returns the tag object OID
          # (not a commit), which GitHub Deployments API rejects.
          SHA=$(git rev-parse --verify "$REF^{commit}" 2>/dev/null \
            || git rev-parse --verify "origin/$REF^{commit}" 2>/dev/null)
          if [[ -z "$SHA" ]]; then
            echo "::error::Cannot resolve ref: $REF"
            exit 1
          fi
          SHORT_SHA=$(git rev-parse --short=7 "$SHA")
          echo "commit_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved $REF → $SHA"

      # -----------------------------------------------------------------
      # Guards
      # -----------------------------------------------------------------
      - name: "Guard · GA tag must not exist (prod-deploy)"
        if: steps.event.outputs.target == 'prod-deploy'
        env:
          GA_TAG: ${{ steps.version.outputs.ga_tag }}
        run: |
          if git rev-parse --verify "refs/tags/$GA_TAG" >/dev/null 2>&1; then
            echo "::error::GA tag $GA_TAG already exists."
            exit 1
          fi

      - name: "Guard · rollback authorization"
        if: steps.event.outputs.target == 'rollback'
        env:
          ACTOR: ${{ github.actor }}
        run: |
          if [[ ! -f .github/approvers.yml ]]; then
            echo "::error::approvers.yml not found"
            exit 1
          fi
          APPROVED=false
          while IFS= read -r line; do
            name=$(echo "$line" | sed -E 's/^[[:space:]]*-[[:space:]]*//' | tr -d ' ')
            [[ "$name" == "$ACTOR" ]] && APPROVED=true && break
          done < <(awk '/^production:/{flag=1; next} /^[a-z]/{flag=0} flag' .github/approvers.yml)

          if [[ "$APPROVED" != "true" ]]; then
            echo "::error::@$ACTOR not authorized for rollback"
            exit 1
          fi

  # ================================================================
  # BUILD — SIMULATED
  # ================================================================
  build:
    name: "Build · ${{ needs.setup.outputs.image_tag }}"
    needs: setup
    if: contains(fromJSON('["dev","stg","prod-build"]'), needs.setup.outputs.target)
    runs-on: ubuntu-latest
    steps:
      - name: Simulate build
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
          APP_ENV: ${{ needs.setup.outputs.app_env }}
        run: |
          echo "::notice::[SIMULATED] Building image $IMAGE_TAG for $APP_ENV"
          echo "- Vault fetch ($APP_ENV vault path) ..."
          sleep 2
          echo "- envsubst Dockerfile ..."
          sleep 1
          echo "- docker build --platform linux/arm64 -t $IMAGE_TAG ."
          sleep 3
          echo "- docker push ECR:$IMAGE_TAG"
          sleep 1
          echo "✅ [SIMULATED] Image pushed: $IMAGE_TAG"

  # ================================================================
  # RETAG — SIMULATED
  # ================================================================
  retag:
    name: "Retag · ${{ needs.setup.outputs.version }}-prod → ${{ needs.setup.outputs.image_tag }}"
    needs: setup
    if: needs.setup.outputs.target == 'prod-deploy'
    runs-on: ubuntu-latest
    steps:
      - name: Simulate retag
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          TARGET_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          echo "::notice::[SIMULATED] Retag ECR ${VERSION}-prod-arm → $TARGET_TAG"
          sleep 1
          echo "✅ [SIMULATED] Retagged successfully"

  # ================================================================
  # ROLLBACK VERIFY — SIMULATED
  # ================================================================
  rollback-verify:
    name: "Rollback verify · ${{ needs.setup.outputs.image_tag }}"
    needs: setup
    if: needs.setup.outputs.target == 'rollback'
    runs-on: ubuntu-latest
    steps:
      - name: Simulate verify
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          echo "::notice::[SIMULATED] Verified image $IMAGE_TAG exists in ECR"

  # ================================================================
  # DEPLOY — SIMULATED
  # ================================================================
  deploy:
    name: "Deploy · ${{ needs.setup.outputs.app_env }}"
    needs: [setup, build, retag, rollback-verify]
    if: |
      always()
      && needs.setup.result == 'success'
      && contains(fromJSON('["dev","stg","prod-deploy","rollback"]'), needs.setup.outputs.target)
      && (
        (needs.setup.outputs.target == 'dev' && needs.build.result == 'success') ||
        (needs.setup.outputs.target == 'stg' && needs.build.result == 'success') ||
        (needs.setup.outputs.target == 'prod-deploy' && needs.retag.result == 'success') ||
        (needs.setup.outputs.target == 'rollback' && needs.rollback-verify.result == 'success')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Simulate helm deploy
        env:
          APP_ENV: ${{ needs.setup.outputs.app_env }}
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          echo "::notice::[SIMULATED] helm upgrade voila-pos-web-$APP_ENV --image.tag=$IMAGE_TAG"
          sleep 2
          echo "✅ [SIMULATED] Deployed to $APP_ENV cluster"

  # ================================================================
  # TAG
  # ================================================================
  tag:
    name: "Tag · create git tag"
    needs: [setup, deploy]
    if: |
      always()
      && needs.deploy.result == 'success'
      && contains(fromJSON('["stg","prod-deploy"]'), needs.setup.outputs.target)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create and push tag
        env:
          TARGET: ${{ needs.setup.outputs.target }}
          COMMIT: ${{ needs.setup.outputs.commit_sha }}
          RC_TAG: ${{ needs.setup.outputs.rc_tag }}
          GA_TAG: ${{ needs.setup.outputs.ga_tag }}
          RELEASE_TYPE: ${{ needs.setup.outputs.release_type }}
          TRIGGERED_BY: ${{ needs.setup.outputs.triggered_by }}
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          git config user.name "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"

          if [[ "$TARGET" == "stg" ]]; then
            git tag -f "$RC_TAG" "$COMMIT"
            git push origin "$RC_TAG" --force
            echo "::notice::RC tag: $RC_TAG → $COMMIT"
          else
            git tag -a "$GA_TAG" "$COMMIT" -m "Release $GA_TAG

          Release-Type: $RELEASE_TYPE
          Triggered-By: @$TRIGGERED_BY
          Commit: $COMMIT"
            git push origin "$GA_TAG"
            echo "::notice::GA tag: $GA_TAG → $COMMIT"
          fi

  # ================================================================
  # CHANGELOG
  # ================================================================
  changelog:
    name: "Changelog · since last deploy to ${{ needs.setup.outputs.deployment_env }}"
    needs: [setup, deploy, tag]
    if: |
      always()
      && needs.setup.outputs.deployment_env != ''
      && (
        (contains(fromJSON('["dev","stg","rollback"]'), needs.setup.outputs.target) && needs.deploy.result == 'success') ||
        (needs.setup.outputs.target == 'prod-deploy' && needs.deploy.result == 'success' && needs.tag.result == 'success')
      )
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.gen.outputs.body }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get last deployment SHA
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_ENV: ${{ needs.setup.outputs.deployment_env }}
        run: |
          PREV_SHA=$(gh api \
            "repos/${{ github.repository }}/deployments?environment=${DEPLOY_ENV}&per_page=10" \
            --jq '[.[] | select(.sha != null)] | .[0].sha // ""')

          if [[ -z "$PREV_SHA" ]]; then
            echo "has_prev=false" >> "$GITHUB_OUTPUT"
            echo "prev_sha=" >> "$GITHUB_OUTPUT"
          else
            echo "has_prev=true" >> "$GITHUB_OUTPUT"
            echo "prev_sha=$PREV_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: gen
        env:
          HAS_PREV: ${{ steps.prev.outputs.has_prev }}
          PREV_SHA: ${{ steps.prev.outputs.prev_sha }}
          COMMIT: ${{ needs.setup.outputs.commit_sha }}
          SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
          DEPLOY_ENV: ${{ needs.setup.outputs.deployment_env }}
        run: |
          if [[ "$HAS_PREV" == "true" ]] && git cat-file -e "$PREV_SHA" 2>/dev/null; then
            CHANGELOG=$(git log "${PREV_SHA}..${COMMIT}" --no-merges --pretty=format:"- \`%h\` %s (@%an)")
            HEADER="## Changes since last deploy to ${DEPLOY_ENV} (${PREV_SHA:0:7}..${SHORT_SHA}):"
          else
            CHANGELOG=$(git log "$COMMIT" --max-count=20 --no-merges --pretty=format:"- \`%h\` %s (@%an)")
            HEADER="## Changes (last 20 commits — no previous deploy to ${DEPLOY_ENV}):"
          fi
          [[ -z "$CHANGELOG" ]] && CHANGELOG="_No new commits since last deploy._"

          {
            echo "${HEADER}"
            echo ""
            echo "${CHANGELOG}"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "body<<CHANGELOG_EOF"
            echo "${HEADER}"
            echo ""
            echo "${CHANGELOG}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

          COUNT=$(echo "${CHANGELOG}" | grep -c '^- ' || true)
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

  # ================================================================
  # DEPLOYMENT RECORD
  # ================================================================
  deployment-record:
    name: "Deployment · record to ${{ needs.setup.outputs.deployment_env }}"
    needs: [setup, deploy, changelog]
    if: |
      always()
      && needs.setup.outputs.deployment_env != ''
      && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment record
        uses: actions/github-script@v7
        env:
          ENV: ${{ needs.setup.outputs.deployment_env }}
          COMMIT: ${{ needs.setup.outputs.commit_sha }}
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
          TRIGGERED_BY: ${{ needs.setup.outputs.triggered_by }}
          COMMIT_COUNT: ${{ needs.changelog.outputs.count }}
        with:
          script: |
            const count = process.env.COMMIT_COUNT || '0';
            let desc = `${count} commits · ${process.env.IMAGE_TAG} · by @${process.env.TRIGGERED_BY}`;
            if (desc.length > 139) desc = desc.substring(0, 136) + '...';

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.COMMIT,
              environment: process.env.ENV,
              auto_merge: false,
              required_contexts: [],
              description: desc,
              transient_environment: false,
              production_environment: process.env.ENV === 'production',
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: 'Deployment successful',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            console.log(`Created deployment #${deployment.data.id} for ${process.env.ENV}`);

  # ================================================================
  # OPEN ISSUE (prod-build only)
  # ================================================================
  open-issue:
    name: "Issue · open approval for ${{ needs.setup.outputs.version }}"
    needs: [setup, build]
    if: |
      always()
      && needs.setup.outputs.target == 'prod-build'
      && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get last prod deployment SHA
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_SHA=$(gh api \
            "repos/${{ github.repository }}/deployments?environment=production&per_page=10" \
            --jq '[.[] | select(.sha != null)] | .[0].sha // ""')
          echo "prev_sha=${PREV_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build issue body
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          RC_TAG: ${{ needs.setup.outputs.rc_tag }}
          COMMIT: ${{ needs.setup.outputs.commit_sha }}
          SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
          RELEASE_TYPE: ${{ needs.setup.outputs.release_type }}
          TRIGGERED_BY: ${{ needs.setup.outputs.triggered_by }}
          PREV_SHA: ${{ steps.prev.outputs.prev_sha }}
        run: |
          if [[ -n "$PREV_SHA" ]] && git cat-file -e "$PREV_SHA" 2>/dev/null; then
            CHANGELOG=$(git log "${PREV_SHA}..${COMMIT}" --no-merges --pretty=format:"- \`%h\` %s (@%an)")
            CHANGELOG_HEADER="Changes since last production deploy (${PREV_SHA:0:7}..${SHORT_SHA})"
          else
            CHANGELOG=$(git log "$COMMIT" --max-count=20 --no-merges --pretty=format:"- \`%h\` %s (@%an)")
            CHANGELOG_HEADER="Changes (last 20 commits — no reachable previous deploy)"
          fi

          {
            echo "## Deployment metadata"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | \`$VERSION\` |"
            echo "| RC tag | \`$RC_TAG\` |"
            echo "| Commit | \`$SHORT_SHA\` |"
            echo "| Release type | \`$RELEASE_TYPE\` |"
            echo "| Prepared by | @$TRIGGERED_BY |"
            echo "| Prepared at | $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo ""
            echo "### $CHANGELOG_HEADER"
            echo ""
            echo "${CHANGELOG:-_No new commits._}"
            echo ""
            echo "---"
            echo ""
            echo "### Approval"
            echo ""
            echo "| Command | Action |"
            echo "|---|---|"
            echo "| \`/approve\` | ✅ Deploy to production |"
            echo "| \`/reject <reason>\` | 🚫 Cancel |"
            echo ""
            echo "> Only users in \`.github/approvers.yml\` production list can approve."
            echo ""
            echo "<!-- release-meta"
            echo "rc_tag: $RC_TAG"
            echo "ga_tag: $VERSION"
            echo "release_type: $RELEASE_TYPE"
            echo "triggered_by: $TRIGGERED_BY"
            echo "-->"
          } > /tmp/issue-body.md

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "pending-prod-deploy" --force \
            --color "e3b341" \
            --description "Awaiting approval to deploy to production" 2>/dev/null || true

      - name: Open approval issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.version }}
          RELEASE_TYPE: ${{ needs.setup.outputs.release_type }}
        run: |
          TITLE_SUFFIX=""
          case "$RELEASE_TYPE" in
            hotfix)     TITLE_SUFFIX=" · HOTFIX" ;;
            cherrypick) TITLE_SUFFIX=" · CHERRYPICK" ;;
          esac

          TITLE="Awaiting approval: $VERSION → production$TITLE_SUFFIX"

          ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body-file /tmp/issue-body.md \
            --label "pending-prod-deploy")

          echo "::notice::Issue opened: $ISSUE_URL"

  # ================================================================
  # PROD FINALIZE
  # ================================================================
  prod-finalize:
    name: "Finalize · publish Release + close issue"
    needs: [setup, deploy, tag, changelog, deployment-record]
    if: |
      always()
      && needs.setup.outputs.target == 'prod-deploy'
      && needs.deploy.result == 'success'
      && needs.tag.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at GA tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ga_tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GA_TAG: ${{ needs.setup.outputs.ga_tag }}
          RC_TAG: ${{ needs.setup.outputs.rc_tag }}
          RELEASE_TYPE: ${{ needs.setup.outputs.release_type }}
          TRIGGERED_BY: ${{ needs.setup.outputs.triggered_by }}
          CHANGELOG_BODY: ${{ needs.changelog.outputs.body }}
        run: |
          BADGE=""
          case "$RELEASE_TYPE" in
            hotfix)     BADGE="> **🚨 Hotfix release**" ;;
            cherrypick) BADGE="> **🍒 Cherry-pick release**" ;;
          esac

          {
            [[ -n "$BADGE" ]] && { echo "$BADGE"; echo ""; }
            echo "$CHANGELOG_BODY"
            echo ""
            echo "---"
            echo ""
            echo "**RC tag:** \`$RC_TAG\`"
            echo "**Deployed by:** @$TRIGGERED_BY"
            echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M UTC')"
          } > /tmp/release-notes.md

          TITLE="$GA_TAG"
          [[ "$RELEASE_TYPE" == "hotfix" ]] && TITLE="$GA_TAG · HOTFIX"
          [[ "$RELEASE_TYPE" == "cherrypick" ]] && TITLE="$GA_TAG · CHERRYPICK"

          gh release create "$GA_TAG" \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md

          echo "::notice::Published Release $GA_TAG"

      - name: Close approval issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GA_TAG: ${{ needs.setup.outputs.ga_tag }}
          TRIGGERED_BY: ${{ needs.setup.outputs.triggered_by }}
        run: |
          ISSUE_NUM=$(gh issue list \
            --label "pending-prod-deploy" \
            --search "$GA_TAG in:title" \
            --json number \
            --jq '.[0].number')

          if [[ -n "$ISSUE_NUM" ]]; then
            gh issue comment "$ISSUE_NUM" --body "✅ Deployed \`$GA_TAG\` to production at $(date -u '+%Y-%m-%d %H:%M UTC') by @$TRIGGERED_BY"
            gh issue close "$ISSUE_NUM"
            echo "::notice::Closed issue #$ISSUE_NUM"
          fi

  # ================================================================
  # ROLLBACK FINALIZE
  # ================================================================
  rollback-finalize:
    name: "Finalize · rollback annotations"
    needs: [setup, deploy, deployment-record]
    if: |
      always()
      && needs.setup.outputs.target == 'rollback'
      && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (needed for gh CLI repo context)
        uses: actions/checkout@v4

      - name: Identify current latest Release
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROLLBACK_TO: ${{ needs.setup.outputs.ga_tag }}
        run: |
          CURRENT=$(gh release list --limit 10 --json tagName,isLatest,isDraft \
            --jq '[.[] | select(.isDraft == false and .isLatest == true)] | .[0].tagName // ""')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Annotate Releases with rollback notes
        if: steps.versions.outputs.current != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT: ${{ steps.versions.outputs.current }}
          ROLLBACK_TO: ${{ needs.setup.outputs.ga_tag }}
          TRIGGERED_BY: ${{ needs.setup.outputs.triggered_by }}
        run: |
          TS=$(date -u '+%Y-%m-%d %H:%M UTC')

          EXISTING=$(gh release view "$CURRENT" --json body --jq '.body')
          gh release edit "$CURRENT" --notes "$EXISTING

          ---

          ⚠️ **Rolled back to \`$ROLLBACK_TO\`** at $TS by @$TRIGGERED_BY"

          EXISTING=$(gh release view "$ROLLBACK_TO" --json body --jq '.body')
          gh release edit "$ROLLBACK_TO" --notes "$EXISTING

          ---

          🔄 **Re-activated via rollback** at $TS by @$TRIGGERED_BY (rolled back from \`$CURRENT\`)"

          echo "::notice::Annotated both releases"

  # ================================================================
  # NOTIFY
  # ================================================================
  notify:
    name: "Notify · status"
    needs:
      - setup
      - build
      - retag
      - rollback-verify
      - deploy
      - tag
      - changelog
      - deployment-record
      - open-issue
      - prod-finalize
      - rollback-finalize
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine overall status
        id: status
        run: |
          STATUS="success"
          for result in \
            "${{ needs.setup.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.retag.result }}" \
            "${{ needs.rollback-verify.result }}" \
            "${{ needs.deploy.result }}" \
            "${{ needs.tag.result }}" \
            "${{ needs.open-issue.result }}" \
            "${{ needs.prod-finalize.result }}" \
            "${{ needs.rollback-finalize.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              STATUS="failure"
              break
            fi
          done
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Log final status
        env:
          STATUS: ${{ steps.status.outputs.status }}
          TARGET: ${{ needs.setup.outputs.target }}
          VERSION: ${{ needs.setup.outputs.version }}
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
          RELEASE_TYPE: ${{ needs.setup.outputs.release_type }}
          TRIGGERED_BY: ${{ needs.setup.outputs.triggered_by }}
          COMMIT_COUNT: ${{ needs.changelog.outputs.count }}
        run: |
          if [[ "$STATUS" == "success" ]]; then
            case "$TARGET" in
              dev)         EMOJI="🚀"; ACTION="Dev deployed" ;;
              stg)         EMOJI="📦"; ACTION="Staging deployed" ;;
              prod-build)  EMOJI="🔧"; ACTION="Prod image built (awaiting approval)" ;;
              prod-deploy) EMOJI="🎉"; ACTION="Production deployed" ;;
              rollback)    EMOJI="⏪"; ACTION="Production rolled back" ;;
            esac
          else
            EMOJI="❌"; ACTION="FAILED: $TARGET"
          fi

          {
            echo "## $EMOJI $ACTION"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | \`${VERSION:-n/a}\` |"
            echo "| Image | \`${IMAGE_TAG:-n/a}\` |"
            echo "| Release type | \`${RELEASE_TYPE:-regular}\` |"
            echo "| Triggered by | @${TRIGGERED_BY:-unknown} |"
            echo "| Commits | ${COMMIT_COUNT:-0} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mark deployment failure (if applicable)
        if: |
          steps.status.outputs.status == 'failure' &&
          needs.setup.outputs.deployment_env != '' &&
          needs.deployment-record.result != 'success'
        uses: actions/github-script@v7
        env:
          ENV: ${{ needs.setup.outputs.deployment_env }}
          COMMIT: ${{ needs.setup.outputs.commit_sha }}
          TRIGGERED_BY: ${{ needs.setup.outputs.triggered_by }}
        with:
          script: |
            try {
              const deployment = await github.rest.repos.createDeployment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: process.env.COMMIT,
                environment: process.env.ENV,
                auto_merge: false,
                required_contexts: [],
                description: `Failed · by @${process.env.TRIGGERED_BY}`,
                transient_environment: false,
                production_environment: process.env.ENV === 'production',
              });
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'failure',
                description: 'Workflow failed',
                log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } catch (e) {
              console.log('Could not record failure:', e.message);
            }
