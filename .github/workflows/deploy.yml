name: Deploy Demo
run-name: "${{ inputs.environment }} | ref=${{ inputs.ref }} | by:${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      ref:
        description: Git ref (branch/tag/sha) to deploy
        required: false
        default: main
        type: string

jobs:
  deploy:
    name: "Deploy → ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Show commit info
        run: |
          echo "Target  : ${{ inputs.environment }}"
          echo "Ref     : ${{ inputs.ref }}"
          echo "Commit  : $(git rev-parse HEAD)"
          echo "ShortSHA: $(git rev-parse --short HEAD)"

      - name: Get previous deployment SHA
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENV: ${{ inputs.environment }}
        run: |
          # Cari deployment terakhir untuk env yang sama (state = success)
          PREV_SHA=$(gh api "repos/${{ github.repository }}/deployments?environment=${ENV}&per_page=10" \
            --jq '[.[] | select(.sha != null)] | .[0].sha // ""')

          if [[ -z "$PREV_SHA" ]]; then
            echo "No previous deployment for ${ENV}, showing last 10 commits"
            echo "has_prev=false" >> $GITHUB_OUTPUT
            echo "prev_sha=" >> $GITHUB_OUTPUT
          else
            echo "Previous deploy SHA: ${PREV_SHA}"
            echo "has_prev=true" >> $GITHUB_OUTPUT
            echo "prev_sha=${PREV_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        env:
          HAS_PREV: ${{ steps.prev.outputs.has_prev }}
          PREV_SHA: ${{ steps.prev.outputs.prev_sha }}
        run: |
          if [[ "$HAS_PREV" == "true" ]]; then
            # Cek kalau PREV_SHA masih ada di history (bisa hilang kalau di-rebase/force-push)
            if git cat-file -e "$PREV_SHA" 2>/dev/null; then
              RANGE="${PREV_SHA}..HEAD"
              HEADER="## Changes since last deploy (${PREV_SHA:0:7}..$(git rev-parse --short HEAD)):"
            else
              RANGE="HEAD~10..HEAD"
              HEADER="## Changes (last 10 commits — previous deploy SHA not reachable):"
            fi
          else
            RANGE="HEAD~10..HEAD"
            HEADER="## Changes (last 10 commits — no previous deploy):"
          fi

          CHANGELOG=$(git log "$RANGE" --no-merges --pretty=format:"- \`%h\` %s (@%an)")

          if [[ -z "$CHANGELOG" ]]; then
            CHANGELOG="_No new commits since last deploy._"
          fi

          # Output ke step summary (akan ter-render bagus di Actions UI)
          {
            echo "${HEADER}"
            echo ""
            echo "${CHANGELOG}"
          } >> $GITHUB_STEP_SUMMARY

          # Echo ke console log juga (untuk logs view)
          echo ""
          echo "${HEADER}"
          echo ""
          echo "${CHANGELOG}"
          echo ""

          # Simpan untuk step lain (escape multiline)
          {
            echo "body<<CHANGELOG_EOF"
            echo "${HEADER}"
            echo ""
            echo "${CHANGELOG}"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

          # Count commits
          COUNT=$(echo "${CHANGELOG}" | grep -c '^- ' || echo 0)
          echo "count=${COUNT}" >> $GITHUB_OUTPUT

      - name: Create deployment record
        id: deployment
        uses: actions/github-script@v7
        env:
          ENV: ${{ inputs.environment }}
          REF: ${{ inputs.ref }}
          ACTOR: ${{ github.actor }}
          COMMIT_COUNT: ${{ steps.changelog.outputs.count }}
        with:
          script: |
            const count = process.env.COMMIT_COUNT || '0';
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.REF,
              environment: process.env.ENV,
              auto_merge: false,
              required_contexts: [],
              description: `${count} commits · by @${process.env.ACTOR}`,
              transient_environment: false,
              production_environment: process.env.ENV === 'production',
            });
            console.log(`Created deployment #${deployment.data.id} (sha ${deployment.data.sha})`);
            core.setOutput('id', deployment.data.id);

      - name: Mark in_progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: 'in_progress',
              description: 'Deployment started',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Simulate build
        run: |
          echo "Building for ${{ inputs.environment }}..."
          sleep 3
          echo "Build complete."

      - name: Simulate deploy
        run: |
          echo "Deploying to ${{ inputs.environment }}..."
          sleep 2
          echo "Deployed."

      - name: Mark success
        if: success()
        uses: actions/github-script@v7
        env:
          ENV: ${{ inputs.environment }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: 'success',
              description: 'Deployment successful',
              environment_url: `https://example.com/${process.env.ENV}`,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Mark failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: 'failure',
              description: 'Deployment failed',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
